          items:
            type: "string"
          minItems: 1
          maxItems: 50
    ListVirtualGatewaysResponseBody:
      required:
        - "request_id"
        - "virtual_gateways"
      type: "object"
      properties:
        request_id:
          type: "string"
          description: "Specifies the request ID."
        virtual_gateways:
          type: "array"
