            If the priorities are the same, the virtual interfaces work in load balancing mode. If the priorities are different, the virtual interfaces work in active/standby pairs. Outbound traffic is preferentially forwarded to the normal virtual interface with a higher priority.

            This option is only supported by virtual interfaces that use BGP routing.
          type: "string"
          enum:
            - "normal"
            - "low"
          default: "normal"
        vif_peers:
          type: "array"
          items:
            $ref: "#/components/schemas/VifPeer"
          description: "Provides information about virtual interface peers. [(This is a reserved parameter and is not supported currently.)](tag:dt)"
        extend_attribute:
          $ref: "#/components/schemas/VifExtendAttribute"
    VifExtendAttribute:
      description: "Specifies extended parameters when BFD or NQA is used for reliability detection."
      type: "object"
      properties:
        ha_type:
          type: "string"
          description: |-
            Specifies the availability detection type of the virtual interface. The value can be:
            - **nqa**: network quality analysis
            - **bfd**: bidirectional forwarding detection
          enum:
            - "nqa"
            - "bfd"
        ha_mode:
          type: "string"
          description: |-
            Specifies the availability detection mode of the virtual interface. The value can be:
            - **auto_single**: automatic single-hop BFD
            - **auto_multi**: automatic multi-hop BFD
            - **static_single**: static single-hop BFD
            - **static_multi**: static multi-hop BFD
            - **enhance_nqa**: enhanced NQA
          enum:
            - "auto_single"
            - "auto_multi"
            - "static_single"
            - "static_multi"
            - "enhance_nqa"
        detect_multiplier:
          type: "integer"
          description: "Specifies the number of detection retries."
          format: "int32"
          default: 5
          maximum: 20
          minimum: 3
          example: 5
        min_rx_interval:
          type: "integer"
          description: |-
            Specifies how often the system receives detection packets, in milliseconds.
            - If you set **ha_type** to **nqa**, the system rounds up your input time to the nearest full second. For instance, entering 1500 milliseconds sets the interval to 2 seconds.
            - If you set **ha_type** to **bfd**, the system uses the input time (in milliseconds) as the interval. The value ranges from 200 ms to 1000 ms.
          format: "int32"
          default: 1000
          maximum: 5000
          minimum: 200
          example: 1000
        min_tx_interval:
          type: "integer"
          description: |-
            Specifies how often the system sends detection packets, in milliseconds.
            - If you set **ha_type** to **nqa**, the system rounds up your input time to the nearest full second. For instance, entering 1500 milliseconds sets the interval to 2 seconds.
            - If you set **ha_type** to **bfd**, the system uses the input time (in milliseconds) as the interval. The value ranges from 200 ms to 1000 ms.
          format: "int32"
          default: 1000
          maximum: 5000
          minimum: 200
          example: 1000
        remote_disclaim:
          type: "integer"
          description: "Specifies the remote identifier of the static BFD session."
          format: "int32"
          maximum: 16384
          minimum: 1
          example: 500
        local_disclaim:
          type: "integer"
          description: "Specifies the local identifier of the static BFD session."
          format: "int32"
          maximum: 16384
          minimum: 1
          example: 500
        ipv6_remote_disclaim:
          type: "integer"
          description: "Specifies the remote identifier of the static IPv6 BFD session."
          format: "int32"
          maximum: 16384
          minimum: 1
          example: 500
        ipv6_local_disclaim:
          type: "integer"
          description: "Specifies the local identifier of the static IPv6 BFD session."
          format: "int32"
          maximum: 16384
          minimum: 1
          example: 500
    VifPeer:
      description: "Specifies the virtual interface peer."
      type: "object"
      properties:
        id:
          type: "string"
          description: "Specifies the resource ID."
          minLength: 36
          maxLength: 36
          example: "c768eb52-12a8-4859-9b43-81194643040c"
        tenant_id:
          type: "string"
          description: "Specifies the ID of the project that the virtual interface peer belongs to."
          minLength: 36
          maxLength: 36
          example: "0605768a3300d5762f82c01180692873"
        name:
          maxLength: 64
          minLength: 0
          type: "string"
          description: "Specifies the name of the virtual interface peer."
          example: "peer-ipv4"
        description:
          maxLength: 128
          minLength: 0
          type: "string"
          description: "Provides supplementary information about the virtual interface peer."
        address_family:
          type: "string"
          description: "Specifies the address family type of the virtual interface, which can be **IPv4** or **IPv6**."
        local_gateway_ip:
          type: "string"
          description: "Specifies the address of the virtual interface peer used on the cloud."
        remote_gateway_ip:
          type: "string"
          description: "Specifies the address of the virtual interface peer used in the on-premises data center."
        route_mode:
          description: "Specifies the routing mode, which can be **static** or **bgp**."
          type: "string"
          maxLength: 255
          enum:
            - "bgp"
            - "static"
          example: "bgp"
        bgp_asn:
          description: "Specifies the ASN of the BGP peer."
          type: "integer"
          format: "int32"
          maximum: 4294967295
          minimum: 1
          example: 65000
        bgp_md5:
          type: "string"
          description: "Specifies the MD5 password of the BGP peer."
        remote_ep_group:
          type: "array"
          items:
            type: "string"
          description: "Specifies the remote subnet list, which records the CIDR blocks used in the on-premises data center."
        service_ep_group:
          type: "array"
          items:
            type: "string"
          description: "Specifies the list of public network addresses that can be accessed by the on-premises data center. This field is required in the APIs of public network connections."
        device_id:
          type: "string"
          description: "Specifies the ID of the device that the virtual interface peer belongs to."
        bgp_route_limit:
          type: "integer"
          description: "Specifies the BGP route configuration."
          format: "int32"
        bgp_status:
          type: "string"
          description: "Specifies the BGP protocol status of the virtual interface peer. If the virtual interface peer uses static routing, the status is **null**."
          maxLength: 10
        status:
          type: "string"
          description: "Specifies the status of the virtual interface peer."
          example: "ACTIVE"
        vif_id:
          type: "string"
          description: "Specifies the ID of the virtual interface corresponding to the virtual interface peer."
          minLength: 36
          maxLength: 36
          example: "0d0fdf63-f2c4-491c-8866-d504796189be"
        receive_route_num:
          type: "integer"
          format: "int32"
          description: |-
            Specifies the number of received BGP routes if BGP routing is used.

            If static routing is used, this parameter is meaningless and the value is **-1**.

            Note: If this parameter cannot be obtained, contact customer service to migrate your ports.
          example: 2
        enable_nqa:
          type: "boolean"
          description: "Specifies whether to enable NQA. The value can be **true** or **false**."
          example: false
        enable_bfd:
          type: "boolean"
          description: "Specifies whether to enable BFD. The value can be **true** or **false**."
          example: false
