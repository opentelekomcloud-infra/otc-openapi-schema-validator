openapi: "3.0.1"
info:
  description: "Direct Connect provides management and orchestration for dedicated connections from on-premises data centers to the cloud."
  version: "v3"
  title: DC testing
  termsOfService: ""
servers:
  - url: "/"
tags:
  - name: "DirectConnect"
    description: "Connection management"
    x-name: "Connections"
  - name: "VirtualGateway"
    description: "Virtual gateway management"
    x-name: "Virtual Gateways"
  - name: "VirtualInterface"
    description: |-
      Virtual interface management. To support IPv6 or dual stack, you need to configure virtual interface peers.
      
      Virtual interface peer-related APIs are supported in some regions. If an exception occurs during API calling, contact customer service.
      
      If old Direct Connect resources are used, IPv6 may not be supported. In this case, contact customer service to migrate the ports of the Direct Connect resources.
    x-name: "Virtual Interfaces"
  - name: "TagManage"
    description: "Resource tag management"
    x-name: "Tag management"
  - name: "QuotaManager"
    description: "API for querying quotas"
    x-name: "Quota Management"
