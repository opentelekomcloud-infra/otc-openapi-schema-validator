        virtual_gateway:
          $ref: "#/components/schemas/VirtualGateway"
        request_id:
          type: "string"
          description: "Specifies the request ID."
      description: ""
    UpdateVirtualGatewayRequestBody:
      type: "object"
      properties:
        virtual_gateway:
          $ref: "#/components/schemas/UpdateVirtualGateway"
    UpdateVirtualGateway:
      description: "Specifies the virtual gateway to be updated."
      type: "object"
      properties:
        name:
          maxLength: 64
          minLength: 0
          type: "string"
          description: "Specifies the virtual gateway name."
        description:
          maxLength: 128
          minLength: 0
          type: "string"
          description: "Provides supplementary information about the virtual gateway."
        local_ep_group:
          type: "array"
          description: "Lists the IPv4 subnets that can be accessed over the virtual gateway. Generally, the list contains the subnet CIDR blocks of the associated VPC. [The list can be updated only when the virtual gateway is associated with the VPC.](tag:dt)"
          items:
            type: "string"
          minItems: 1
          maxItems: 200
        local_ep_group_ipv6:
          type: "array"
