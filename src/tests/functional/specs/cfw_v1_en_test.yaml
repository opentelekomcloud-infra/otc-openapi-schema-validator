openapi: 3.0.1
info:
  title: CFW testing
  description: cnfw-api
  version: v1
servers:
- url: /
tags:
- name: Domain Name Management
  description: The APIs are used to manage domain names.
- name: VPC Protection
- name: Rule Hit Count
- name: IPS Switch Management
  description: The APIs are used for IPS switch management.
- name: East-west Protection
- name: ACL Rule Management
  description: The APIs are used for ACL rule management.
- name: Blacklist and Whitelist Management
  description: The APIs are used for blacklist and whitelist management.
- name: Log Query Management
  description: The APIs are used for log query management.
- name: Protection Mode Management
  description: The APIs are used for protection mode management.
- name: Cloud Firewall Information Management
  description: The APIs are used for cloud firewall information management.
- name: Service Group Management
  description: The APIs are used for service group management.
- name: Service Group Member Management
  description: The APIs are used for service group member management.
- name: EIP Management
  description: The APIs are used for EIP management.
- name: Address Group Member Management
  description: The APIs are used for address group member management.
- name: Address Group Management
  description: The APIs are used for address group management.
paths:
  /v1/{project_id}/dns/servers:
    get:
      tags:
      - Domain Name Management
      summary: Querying the DNS Server List
      description: This API is used to query the DNS server list.
      operationId: ListDnsServers
      parameters:
      - name: X-Auth-Token
        in: header
        description: User token. It can be obtained by calling the IAM API used to
          obtain a user token. The value of X-Subject-Token in the response header
          is a token.
        required: true
        schema:
          type: string
      - name: project_id
        in: path
        description: Project ID
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Number of records displayed on each page
        schema:
          type: integer
          format: int32
      - name: offset
        in: query
        description: "Offset, which specifies the start position of the record to\
          \ be returned. The value must be a number no less than 0. The default value\
          \ is **0**."
        schema:
          type: integer
          format: int32
      - name: fw_instance_id
        in: query
        description: "Firewall instance ID, which is automatically generated after\
          \ a CFW instance is created. You can obtain the ID by calling the API used\
          \ for querying a firewall instance. For details, see the API Explorer and\
          \ Help Center FAQ.By default, if fw_instance_Id is not specified, information\
          \ about the first firewall under the account is returned. If fw_instance_Id\
          \ is specified, information about the firewall with this fw_instance_Id\
          \ is returned.If object_Id is specified, information about the firewall\
          \ with this object_Id is returned by default. If both fw_instance_Id and\
          \ object_Id are specified, the specified object_Id must belong to the specified\
          \ firewall."
        schema:
          type: string
      - name: enterprise_project_id
        in: query
        description: "Enterprise project id, the id generated by the enterprise project\
          \ after the user supports the enterprise project."
        schema:
          type: string
      responses:
        "200":
          description: Response to the request for obtaining DNS servers
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HttpGetDnsServersResponseData'
            application/json:
              example:
                data:
                - id: 2380
                  is_applied: 1
                  is_customized: 0
                  server_ip: 100.79.1.240
                - id: 2377
                  is_applied: 0
                  is_customized: 0
                  server_ip: 114.114.114.114
                total: 2
        "401":
          description: Unauthorized
          content: {}
        "403":
          description: Forbidden
          content: {}
        "404":
          description: Not Found
          content: {}
        "500":
          description: Internal Server Error
          content: {}
      x-request-examples-description-1: Obtain the DNS server list of the project
        whose ID is 2349ba469daf4b7daf268bb0261d18b0.
      x-request-examples-url-1: https://console.ulanqab.huawei.com/cfw/v1/2349ba469daf4b7daf268bb0261d18b0/dns/servers
      x-is-registered: "Y"
      x-support-sdk: "Y"
    put:
      tags:
      - Domain Name Management
      summary: Updating the DNS Server List
      description: This API is used to update the DNS server list.
      operationId: UpdateDnsServers
      parameters:
      - name: X-Auth-Token
        in: header
        description: User token. It can be obtained by calling the IAM API used to
          obtain a user token. The value of X-Subject-Token in the response header
          is a token.
        required: true
        schema:
          type: string
      - name: project_id
        in: path
        description: Project ID
        required: true
        schema:
          type: string
      - name: fw_instance_id
        in: query
        description: "Firewall instance ID, which is automatically generated after\
          \ a CFW instance is created. You can obtain the ID by calling the API used\
          \ for querying a firewall instance. For details, see the API Explorer and\
          \ Help Center FAQ.By default, if fw_instance_Id is not specified, information\
          \ about the first firewall under the account is returned. If fw_instance_Id\
          \ is specified, information about the firewall with this fw_instance_Id\
          \ is returned.If object_Id is specified, information about the firewall\
          \ with this object_Id is returned by default. If both fw_instance_Id and\
          \ object_Id are specified, the specified object_Id must belong to the specified\
          \ firewall."
        schema:
          type: string
      - name: enterprise_project_id
        in: query
        description: "Enterprise project id, the id generated by the enterprise project\
          \ after the user supports the enterprise project."
        schema:
          type: string
      requestBody:
        description: Body of the request for updating the DNS server list
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDnsServersRequestBody'
        required: true
      responses:
        "200":
          description: Response to the request for updating the DNS server list
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/UpdateDnsServerResponse'
            application/json:
              example:
                data:
                - 100.95.150.83
                - 114.114.114.114
                - 223.5.5.5
                - 223.6.6.6
                - 119.29.29.29
                - 8.8.8.8
                - 100.79.1.250
                - 100.79.1.240
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRsp'
            application/json:
              example:
                error_code: CFW.01000001
                error_msg: Duplicate DNS server IP address
        "401":
          description: Unauthorized
          content: {}
        "403":
          description: Forbidden
          content: {}
        "404":
          description: Not Found
          content: {}
        "500":
          description: Internal Server Error
          content: {}
      x-request-examples-url-1: "https://{Endpoint}/v1/2349ba469daf4b7daf268bb0261d18b0/dns/servers"
      x-request-examples-description-1: Update the settings of the DNS resolver whose
        project ID is 2349ba469daf4b7daf268bb0261d18b0. Set server 8.8.8.8 to the
        default server and put it in use. Set server IP address 192.168.0.2 to a user-defined
        server and do not put it in use.
      x-request-examples-text-1:
        dns_server:
        - server_ip: 8.8.8.8
          is_customized: 0
          is_applied: 1
        - server_ip: 192.168.0.2
          is_customized: 1
          is_applied: 0
      x-request-examples-1:
        dns_server:
        - server_ip: 8.8.8.8
          is_customized: 0
          is_applied: 1
        - server_ip: 192.168.0.2
          is_customized: 1
          is_applied: 0
      x-is-registered: "Y"
      x-support-sdk: "Y"
      x-codegen-request-body-name: UpdateDnsServersRequestBody
components:
  schemas:
    CommonResponseDTO:
      title: CommonResponseDTO
      type: object
      properties:
        trace_id:
          type: string
          description: trace_id
        data:
          type: object
          properties:
            id:
              type: string
              description: Protected object ID
          description: object
      description: object
    UpdateDnsServersRequestBody:
      type: object
      properties:
        dns_server:
          type: array
          description: DNS server
          items:
            type: object
            properties:
              server_ip:
                type: string
                description: DNS server IP address
                example: 8.8.8.8
              is_customized:
                type: integer
                description: "Indicates whether the DNS server is user-defined. 0:\
                  \ no; 1: yes"
                format: int32
                example: 0
              is_applied:
                type: integer
                description: "Indicates whether to apply. 0: no; 1: yes"
                format: int32
                example: 1
    DnsServersResponseDTO:
      type: object
      properties:
        id:
          type: integer
          description: id
          format: int32
          example: 1
        is_applied:
          type: integer
          description: "Indicates whether to apply. 0: no; 1: yes"
          format: int32
          example: 1
        is_customized:
          type: integer
          description: "Indicates whether the DNS server is user-defined. 0: no; 1:\
            \ yes"
          format: int32
          example: 0
        server_ip:
          type: string
          description: DNS server IP address
          example: 100.125.1.250
    HttpAddDomainSetRequest:
      type: object
      properties:
        object_id:
          type: string
          description: "Protected object ID, which is used to distinguish Internet\
            \ border protection from VPC border protection after a CFW instance is\
            \ created. You can obtain the ID by calling the API used for querying\
            \ a firewall instance. Note that the value 0 indicates the ID of a protected\
            \ object on the Internet border, and the value 1 indicates the ID of a\
            \ protected object on the VPC border. For details, see the API Explorer\
            \ and Help Center FAQ."
          example: 7d7523b1-c3ba-4f2e-a074-6cf8c3b587db
        name:
          type: string
          description: Domain name group
          example: test2
        description:
          type: string
          description: Domain group description
          example: Description
        domain_name:
          type: string
          description: "Domain group member. Members are separated by commas (,)."
          example: "www.baidu.com,*.huawei.com,cdns.com"
      description: Request body for adding a domain name group
    HttpUpdateDomainSetRequest:
      type: object
      properties:
        name:
          type: string
          description: Domain name group
          example: test1
        description:
          type: string
          description: Domain group description
          example: Description 2
        domain_name:
          type: string
          description: "Domain group member. Members are separated by commas (,)."
          example: "www.baidu.com,*.huawei.com"
      description: Request body for updating a domain group
    HttpQueryDomainSetRequest:
      type: object
      properties:
        object_id:
          type: string
          description: "Protected object ID, which is used to distinguish Internet\
            \ border protection from VPC border protection after a CFW instance is\
            \ created. You can obtain the ID by calling the API used for querying\
            \ a firewall instance. Note that the value 0 indicates the ID of a protected\
            \ object on the Internet border, and the value 1 indicates the ID of a\
            \ protected object on the VPC border. For details, see the API Explorer\
            \ and Help Center FAQ."
          example: 7d7523b1-c3ba-4f2e-a074-6cf8c3b587db
        key_word:
          type: string
          description: Keyword
          example: test2
        domain_name:
          type: string
          description: Domain name query keyword
          example: '*.huawei.com'
        offset:
          type: integer
          description: Offset
          format: int32
          example: 0
        limit:
          type: integer
          description: Number of records displayed on each page
          format: int32
          example: 10
      description: Domain group list request body
    HttpDomainSetListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            limit:
              type: integer
              description: Number of records displayed on each page
              format: int32
              example: 10
            offset:
              type: integer
              description: "Offset, which specifies the start position of the record\
                \ to be returned. The value must be a number no less than 0. The default\
                \ value is **0**."
              format: int32
              example: 0
            records:
              type: array
              description: Response record
              items:
                type: object
                properties:
                  domain_name:
                    type: string
                    description: "Domain group member. Members are separated by commas\
                      \ (,)."
                    example: "www.baidu.com,*.huawei.com,cdns.com"
                  description:
                    type: string
                    description: Description
                    example: Description 2
                  name:
                    type: string
                    description: Name
                    example: test
                  ref_count:
                    type: integer
                    description: Reference count
                    format: int32
                    example: 1
                  set_id:
                    type: string
                    description: Domain group ID
                    example: 190a1b0f-7606-466b-a215-7ba6a19fd7f4
            total:
              type: integer
              description: Total
              format: int32
              example: 2
          description: Response body structure
      description: Domain group list response body
    UpdateDnsServerResponse:
      type: object
      properties:
        data:
          type: array
          description: Domain name server list
          items:
            type: string
      description: Response body for updating the DNS server
    ErrorRsp:
      required:
      - error_code
      - error_msg
      type: object
      properties:
        error_code:
          maxLength: 36
          minLength: 8
          type: string
          description: Error code
        error_msg:
          maxLength: 512
          minLength: 2
          type: string
          description: Description
      description: Response returned upon a failure
    HttpGetVpcProtectsResponse:
      type: object
      properties:
        trace_id:
          type: string
          description: Call chain ID
          example: 28f61af50fc9452aa0ed5ea25c3cc3d3
        data:
          $ref: '#/components/schemas/VPCProtectsVo'
      description: Return value of VPC protection query
    VPCProtectsVo:
      type: object
      properties:
        total:
          type: integer
          description: Total number of VPCs
          example: 18
        self_total:
          type: integer
          description: Total number of self VPCs
          format: int32
        other_total:
          type: integer
          description: Total number of other VPCs
          format: int32
        protect_vpcs:
          type: array
          description: Protect VPC
          example: 18
          items:
            $ref: '#/components/schemas/VpcAttachmentDetail'
        self_protect_vpcs:
          type: array
          description: Self Protect VPC
          items:
            $ref: '#/components/schemas/VpcAttachmentDetail'
        other_protect_vpcs:
          type: array
          description: Other Protect VPC
          items:
            $ref: '#/components/schemas/VpcAttachmentDetail'
      description: vpc protects vo
    ClearAccessLogRuleHitCountsDto:
      required:
      - rule_ids
      type: object
      properties:
        rule_ids:
          type: array
          description: Rule ID list
          items:
            type: string
      description: clear access log rule hit counts dto
    ListRuleHitCountDto:
      required:
      - rule_ids
      type: object
      properties:
        rule_ids:
          type: array
          description: Rule ID list
          items:
            type: string
    RuleHitCountRecords:
      type: object
      properties:
        limit:
          type: integer
          description: Number of records displayed on each page
          format: int32
        offset:
          type: integer
          description: "Offset, which specifies the start position of the record to\
            \ be returned. The value must be a number no less than 0. The default\
            \ value is **0**."
          format: int32
        total:
          type: integer
          description: Total
          format: int32
        records:
          type: array
          description: Rule hit count list
          items:
            $ref: '#/components/schemas/RuleHitCountObject'
      description: Rule hit count
    RuleHitCountObject:
      type: object
      properties:
        rule_id:
          type: string
          description: Rule ID
        rule_hit_count:
          type: integer
          description: Rule Hit Count
          format: int32
    GetRuleHitCountResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/RuleHitCountRecords'
    IpsSwitchDTO:
      title: IpsSwitchDTO
      required:
      - ips_type
      - object_id
      - status
      type: object
      properties:
        object_id:
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
          type: string
          description: "Protected object ID, which is used to distinguish Internet\
            \ border protection from VPC border protection after a CFW instance is\
            \ created. You can obtain the ID by calling the API used for querying\
            \ a firewall instance. Note that the value 0 indicates the ID of a protected\
            \ object on the Internet border, and the value 1 indicates the ID of a\
            \ protected object on the VPC border. For details, see the API Explorer\
            \ and Help Center FAQ."
        ips_type:
          type: integer
          description: "Patch type. 1: basic patch; 2: virtual patch"
          format: int32
          enum:
          - 1
          - 2
        status:
          type: integer
          description: IPS switch status
      description: description
      example:
        object_id: 1f1e070a-c5c0-4baf-b9dc-29dfa1abb048
        ips_type: 1
        status: 0
    IpsSwitchResponseDTO:
      title: IpsSwitchResponseDTO
      type: object
      properties:
        id:
          type: string
          description: Ips switch id
        basic_defense_status:
          type: integer
          description: Basic defense status
        virtual_patches_status:
          type: integer
          description: Virtual patch status
      description: Response of the IPS feature status query
      example:
        object_id: 1f1e070a-c5c0-4baf-b9dc-29dfa1abb048
        basic_defense_status: 1
        virtual_patches_stauts: 0
    IpsRuleListResponseDTO:
      allOf:
      - $ref: '#/components/schemas/CommonPageResponseDTO'
      - type: object
        properties:
          records:
            type: array
            description: Return value for querying the IPS rule list
            items:
              type: object
              properties:
                ips_id:
                  type: string
                  description: IPS rule ID
                ips_name:
                  type: string
                  description: IPS rule name
                ips_rules_type:
                  type: string
                  description: IPS attack type
                ips_level:
                  type: integer
                  description: "Risk level (0: Critical; 1: high risk; 2: medium risk;\
                    \ 3: low risk"
                  format: int32
                ips_status:
                  type: integer
                  description: "Protection status. The value can be 0 (intercepted),\
                    \ 1 (disabled), or 2 (observed)."
                  format: int32
                default_status:
                  type: integer
                  description: "Default protection status. The value can be 0 (blocked),\
                    \ 1 (disabled), or 2 (observed)."
                  format: int32
                ips_cve:
                  type: string
                  description: Vulnerability ID
                create_time:
                  type: string
                  description: Release date
    CommonPageResponseDTO:
      type: object
      properties:
        total:
          type: integer
          description: Total
          format: int32
        offset:
          type: integer
          description: "Offset, which specifies the start position of the record to\
            \ be returned. The value must be a number no less than 0. The default\
            \ value is **0**."
          format: int32
        limit:
          type: integer
          description: Number of records displayed on each page
          format: int32
        trace_id:
          type: string
          description: Call chain ID
    AssociatedSubnet:
      required:
      - az
      - subnet_name
      - subnet_segment
      type: object
      properties:
        az:
          type: string
          description: AZ
        subnet_segment:
          type: string
          description: Subnet CIDR
        subnet_name:
          type: string
          description: Subnet name
      description: Associated subnet information
    CreateEastWestFirewallRequestBody:
      required:
      - er_associated_subnet
      - er_id
      - firewall_associated_subnets
      - inspection_vpc_id
      type: object
      properties:
        er_id:
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
          type: string
          description: Instance ID of the associated outbound ER
        inspection_vpc_id:
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
          type: string
          description: inspection vpc id
        er_associated_subnet:
          $ref: '#/components/schemas/SubnetInfo'
        firewall_associated_subnets:
          type: array
          description: Subnet associated with a firewall
          items:
            $ref: '#/components/schemas/SubnetInfo'
      description: Request body for creating an east-west firewall
    SuccessRsp:
      required:
      - data
      - trace_id
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              description: ID
          description: Response body
        trace_id:
          type: string
          description: trace id
      description: Response body returned upon success
    GetEastWestFirewallResponseBody:
      type: object
      properties:
        object_id:
          type: string
          description: "Protected object ID, which is used to distinguish Internet\
            \ border protection from VPC border protection after a CFW instance is\
            \ created. You can obtain the ID by calling the API used for querying\
            \ a firewall instance. Note that the value 0 indicates the ID of a protected\
            \ object on the Internet border, and the value 1 indicates the ID of a\
            \ protected object on the VPC border. For details, see the API Explorer\
            \ and Help Center FAQ."
        project_id:
          type: string
          description: Project ID
        status:
          type: integer
          description: Protection status. The value can be 0 (protection enabled)
            or 1 (protection disabled).
          format: int32
        er_associated_subnet:
          $ref: '#/components/schemas/SubnetInfo'
        firewall_associated_subnets:
          type: array
          description: Subnet associated with CFW
          items:
            $ref: '#/components/schemas/SubnetInfo'
        er:
          $ref: '#/components/schemas/ErInstance'
        inspection_vpc:
          $ref: '#/components/schemas/VpcDetail'
        protect_infos:
          type: array
          description: East-west protection resource information
          items:
            $ref: '#/components/schemas/EwProtectResourceInfo'
        total:
          type: integer
          description: Total number of protected VPCs
          format: int32
        offset:
          type: integer
          description: "Offset, which specifies the start position of the record to\
            \ be returned. The value must be a number no less than 0. The default\
            \ value is **0**."
          format: int32
        limit:
          type: integer
          description: Number of records displayed on each page
          format: int32
      description: Response body of the API for querying east-west firewalls
    EwProtectResourceInfo:
      required:
      - protected_resource_id
      - protected_resource_name
      - protected_resource_type
      type: object
      properties:
        protected_resource_type:
          type: integer
          description: Protection resource type. The value can be 0 (VPC) or 1 (VGW).
          format: int32
        protected_resource_name:
          type: string
          description: Protected resource name
        protected_resource_id:
          type: string
          description: Protected resource ID
        protected_resource_nat_name:
          type: string
          description: Name of the NAT gateway of the protected resource
        protected_resource_nat_id:
          type: string
          description: ID of the NAT gateway of the protected resource
        protected_resource_project_id:
          type: string
          description: Tenant ID of the protected resource
      description: "Information about east-west protection resources, such as VPC\
        \ and VGW"
    ERInfo:
      required:
      - id
      - name
      type: object
      properties:
        id:
          type: string
          description: ER instance ID
        name:
          type: string
          description: ER instance name
      description: Manage enterprise router information
    SubnetInfo:
      required:
      - cidr
      - name
      type: object
      properties:
        availability_zone:
          type: string
          description: Subnet ID
        cidr:
          pattern: "^(?:(?:[0-9]|[1-9]\\d|1\\d{2}|2[0-4]\\d|25[0-5])(?:\\.(?:[0-9]|[1-9]\\\
            d|1\\d{2}|2[0-4]\\d|25[0-5])){3}(?:(?:\\/|\\\\)(?:\\d|[1-2]\\d|3[0-2]))?)$"
          type: string
          description: vpc cidr
        name:
          type: string
          description: Subnet name
        id:
          type: string
          description: Subnet ID
        gateway_ip:
          type: string
          description: Subnet gateway IP address
        vpc_id:
          type: string
          description: vpc id
        status:
          type: string
          description: Subnet status
      description: Manage subnets
    VPCInfo:
      required:
      - vpc_id
      - vpc_name
      type: object
      properties:
        vpc_id:
          type: string
          description: vpc id
        vpc_name:
          type: string
          description: VPC name
      description: VPC information
    ChangeProtectStatusRequestBody:
      required:
      - object_id
      - status
      type: object
      properties:
        object_id:
