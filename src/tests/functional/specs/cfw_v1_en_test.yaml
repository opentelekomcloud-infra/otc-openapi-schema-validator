                    description: ""
                    id: cd7d7f62-0b04-42e8-a859-671dfce75cc1
                    name: er-attach-c4ab
                    project_id: 09bb24e6fe80d23d2fa2c010b53b418c
                    state: available
                    tags: []
                    updated_at: 2022-09-30T02:35:35.332Z
                    virsubnet_id: 81fda592-b1e9-4437-8078-7fcf786f4e80
                    vpc_id: 122c2907-eada-4df4-8ffe-6088cf33d425
                  self_protect_vpcs: []
                  other_protect_vpcs: []
                  total: 1
                  self_total: 0
                  other_total: 0
        "400":
          description: Bad Request
          content:
            application/json:
              example:
                error_code: CFW.00109004
                error_msg: http to external service error
        "401":
          description: Unauthorized
          content: {}
        "403":
          description: Forbidden
          content: {}
        "404":
          description: Not Found
          content: {}
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRsp'
      x-request-examples-url-1: "https://{ENDPOINT}/v1/0b2179bbe180d3762fb0c01a2d5725c7/vpcs/protection?object_id=8839526e-b804-4a15-a082-a2c797dce633"
