    post:
      tags:
      - Topics
      summary: Creating a Topic
      description: |-
        This API is used to create a topic. Each user can create up to 3,000 topics. In high-concurrent scenarios, a user may create a few topics more than 3,000.
        The API is idempotent. It returns a successful result after creating a topic. If a topic of the same name already exists, the status code is 200. Otherwise, the status code is 201.
      operationId: CreateTopic
      parameters:
      - name: project_id
        in: path
        description: "Specifies the project ID.For details about how to obtain the\
          \ project ID, see [Obtaining the Project ID](smn_api_66000.xml)."
        required: true
        schema:
          type: string
        example: 2c31ed520xxxxxxebedb6e81xxxxxxxx
      - name: X-Auth-Token
        in: header
        description: |-
          Specifies a user token.

          It can be obtained by calling an IAM API. The value of X-Subject-Token in the response header is the user token.
        required: true
        schema:
          type: string
        example: MIIDkgYJKoZIhvcNAQcCoIIDgzCCXXXXXX...
      requestBody:
        description: This is a auto create Body Object
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/CreateTopicRequestBody'
        required: true
      responses:
        "201":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CreateTopicResponseBody'
            application/json:
              example:
                request_id: 6a63a18b8bab40ffb71ebd9cb80d0085
                topic_urn: urn:smn:regionId:f96188c7ccaf4ffba0c9aa149ab2bd57:test_topic_v2
