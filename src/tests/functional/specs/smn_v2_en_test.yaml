        updated:
          type: string
          description: "Specifies the version release time, which must be a UTC time.\
            \ For example, the release time of v2 is 2014-06-28T12:20:21Z."
        version:
          type: string
          description: "Specifies the microversion. If the API supports microversions,\
            \ the system returns the supported minimum microversion. If no, the system\
            \ returns an empty value."
        links:
          type: array
