      type: object
      properties:
        display_name:
          maxLength: 192
          minLength: 1
          type: string
          description: "Specifies the topic display name, which is presented as the\
            \ name of the email sender in email messages. The display name cannot\
            \ exceed 192 bytes."
          example: testtest222
    UpdateTopicResponseBody:
      required:
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
    UpdateTopicAttributeResponseBody:
      required:
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
          example: 6837531fd3f54550927b930180a706bf
    DeleteTopicResponseBody:
      required:
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
    DeleteTopicAttributeByNameResponseBody:
      required:
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
    DeleteTopicAttributesResponseBody:
      required:
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
    AddSubscriptionRequestBody:
      required:
      - endpoint
      - protocol
      type: object
      properties:
        protocol:
          type: string
          description: |-
            Subscription protocol. (Different protocols indicate different types of endpoints to receive messages.)
            The following protocols are supported:

            **email**: The endpoints are email addresses.

            **sms**: SMS transmission protocol. The endpoints are phone numbers.

            **functionstage**: FunctionGraph(function) transmission protocol. The endpoints are functions.

            **functiongraph**: FunctionGraph(workflow) transmission protocol. The endpoints are FunctionGraph workflows orchestrated by the FunctionGraph function.

            **http** and **https**: The endpoints are URLs.

            **callnotify**: Voice notification protocol. The endpoints are phone numbers.

            **wechat**: WeCom group chatbot transmission protocol.

            **dingding**: DingTalk group chatbot transmission protocol.

            **feishu**: Lark group chatbot transmission protocol.

            **welink**: WeLink group chatbot transmission protocol.

            **dingTalkBot**: DingTalk transmission protocol.
          example: email
        endpoint:
          type: string
          description: |-
            Note:

            For an HTTP protocol, the endpoint must start with **http://** and be a public IPv4 address, IPv6 address, or domain name. It cannot be a private network IP address, including but not limited to a private IPv4 address, local IPv6 address, or loopback address. Ensure that the IP address can be accessed through a public network route. If not, the IP address may be unreachable due to firewall, NAT Gateway, or DNS configurations.

            For an HTTPS protocol, the endpoint must start with **https://** and be a public IPv4 address, IPv6 address, or domain name. It cannot be a private network IP address, including but not limited to a private IPv4 address, local IPv6 address, or loopback address. Ensure that the IP address can be accessed through a public network route. If not, the IP address may be unreachable due to firewall, NAT Gateway, or DNS configurations.

            For an email protocol, the endpoint must be an email address.

            For an SMS protocol, the endpoint must be a phone number.

            For a FunctionStage protocol, the endpoint must be a function.

            For a FunctionGraph protocol, the endpoint must be a function flow.

            For a callnotify protocol, the endpoint must be a phone number.

            For a DingTalk chatbot protocol, the endpoint must be an IP address of a custom DingTalk group chatbot or **openConversationId** of a group to which an enterprise DingTalk chatbot is added. When you add **openConversationId**, do not start the endpoint with **http://** or **https://**.

            For a WeChat protocol, the endpoint must be an IP address of a WeChat group chatbot.

            For a feishu protocol, the endpoint must be an IP address of a Lark group chatbot.

            For a WeLink protocol, the endpoint must be a WeLink group number.

            For a dingTalkBot protocol, the endpoint must be a DingTalk enterprise user ID.
          example: xxx@example.com
        remark:
          type: string
          description: Specifies the remarks. The remarks must be UTF-8-coded and
            can contain up to 128 bytes.
          example: O&M
        extension:
          $ref: '#/components/schemas/SubscriptionExtension'
        subscriptions:
          maxItems: 50
          minItems: 1
          type: array
          description: This parameter is mandatory when subscriptions need to be created
            in batches. SMN allows you to create a maximum of 50 subscriptions at
            a time.
          items:
            $ref: '#/components/schemas/BatchAddSubscriptionsRequestBody'
    AddSubscriptionResponseBody:
      required:
      - request_id
      - subscription_urn
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
          example: fdbabe38ead6482b8574f82a3d1168e9
        subscription_urn:
          type: string
          description: "Specifies the resource identifier of a subscription, which\
            \ is unique."
          example: urn:smn:regionId:762bdb3251034f268af0e395c53ea09b:test_topic_v1:2e778e84408e44058e6cbc6d3c377837
    CancelSubscriptionResponseBody:
      required:
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
          example: fdbabe38ead6482b8574f82a3d1168e9
    PublishMessageRequestBody:
      type: object
      properties:
        subject:
          type: string
          description: "Specifies the message subject, which is used as the email\
            \ subject when you publish email messages. The length of the subject cannot\
            \ exceed 512 bytes."
          example: test message v2
        message:
          type: string
          description: "Message content. The message content must be UTF-8-coded and\
            \ can be no more than 256 KB. If the endpoint is a phone number, the maximum\
            \ length of an SMS message is 490 characters, or the message may be intercepted.\
            \ The SMS message cannot contain square brackets ([]).Note:The message\
            \ sending modes inclue **message**, **message_structure**, and **message_template_name**.Set\
            \ at least one of them. If you set all of them, they take effect in the\
            \ following sequence:**message_structure** > **message_template_name**\
            \ > **message**"
          example: Message test message v2
        message_structure:
          type: string
          description: "Message structure, which is a JSON string. The options are\
            \ **email**, **sms**, **http**, **https**, **functiongraph**, **functionstage**,\
            \ **dingding**, **wechat**, **feishu**, **welink**, and **dingTalkBot**.\
            \ The **default** protocol is mandatory. If the system fails to match\
            \ any other protocols, the message using the **default** protocol is sent.-\
            \ The **msgType** field must be specified for messages of the DingTalk\
            \ chatbot, WeCom chatbot, Lark chatbot, dingTalkBot, or WeLink protocol.\
            \ The value of **msgType** can be **text** or **markdown** for the DingTalk,\
            \ WeCom, or Lark chatbot protocol, and the value can only be **text**\
            \ for WeLink.- For details about the message length limit for the WeCom\
            \ chatbot, see the official documentation.- For the DingTalk chatbot protocol,\
            \ SMN supports the @ group member function through the **at** field. When\
            \ you need to @ group members, set **isAtAll** to **true**. You can enter\
            \ the phone numbers of group members you want to @ for the **atMobiles**\
            \ field or enter the DingTalk user IDs of group members you want to @\
            \ for the **atUserIds** field. When you use the **atMobiles** or **atUserIds**\
            \ field, add **@** before each phone number or user ID in the message\
            \ content. For details about the display effect, see the official DingTalk\
            \ documentation. A DingTalk group chatbot message cannot exceed 20,000\
            \ bytes. For details, see the official DingTalk documentation.- In the\
            \ Lark chatbot protocol, the title background color of markdown messages\
            \ can be customized via the **color** field. For details about the supported\
            \ **color** fields, see the official documentation. A Lark group chatbot\
            \ message cannot exceed 30 KB. For details, see the official Lark documentation.-\
            \ For details about the message length limit for dingTalkBot messages,\
            \ see the official documentation.Note:The message sending modes include\
            \ **message**, **message_structure**, and **message_template_name**.Set\
            \ at least one of them. If you set all of them, they will be applied in\
            \ the following sequence:**message_structure** > **message_template_name**\
            \ > **message**"
          example: "{   \"default\": \"Message structure test message v2\",   \"sms\"\
            : \"Message structure test message v2\",   \"email\": \"Message structure\
            \ test message v2\",   \"wechat\": \"{\\\"msgtype\\\":\\\"text\\\",\\\"\
            text\\\":{\\\"content\\\":\\\"Message structure test message v2\\\"}}\"\
            ,   \"dingding\": \"{\\\"msgtype\\\":\\\"markdown\\\",\\\"at\\\":{\\\"\
            atMobiles\\\": [\\\"15XXXXXX\\\"],\\\"atUserIds\\\": [\\\"1234567XXX\\\
            \"],\\\"isAtAll\\\": true},\\\"markdown\\\":{\\\"content\\\":\\\"Message\
            \ structure test message v2 @15XXXXXX @1234567XXX\\\",\\\"title\\\":\\\
            \"Message structure title\\\"}}\",   \"feishu\": \"{\\\"msgtype\\\":\\\
            \"markdown\\\",\\\"color\\\":\\\"blue\\\",\\\"markdown\\\":{\\\"content\\\
            \":\\\"Message structure test message v2\\\"}}\",   \"welinkRed\": \"\
            {\\\"msgtype\\\":\\\"text\\\",\\\"text\\\":{\\\"content\\\":\\\"Message\
            \ structure test message v2\\\"}}\",   \"http\": \"Message structure test\
            \ message v2\",   \"https\": \"Message structure test message v2\",  \
            \ \"dingTalkBot\": \"{\\\"msgtype\\\":\\\"markdown\\\",\\\"markdown\\\"\
            :{\\\"content\\\":\\\"Message structure test message v2 dingTalkBot markdown\\\
            \",\\\"title\\\":\\\"Message structure title\\\"}}\",   \"functionstage\"\
            : \"Message structure test message v2\" }"
        message_template_name:
          type: string
          description: "Message template name. To obtain the name, see [Querying Message\
            \ Templates] (ListMessageTemplates.xml).Note:The message sending modes\
            \ inclue **message**, **message_structure**, and **message_template_name**.Set\
            \ at least one of them. If you set all of them, they take effect in the\
            \ following sequence:**message_structure** > **message_template_name**\
            \ > **message**"
          example: confirm_message
        tags:
          type: object
          additionalProperties:
            type: string
          description: Specifies the dictionary consisting of variable parameters
            and values. The value cannot be left blank. This parameter is mandatory
            when you use a message template to publish messages. The key in the dictionary
            is the parameter name in the message template and contains a maximum of
            21 characters. The value in the dictionary is the value after the key
            in the message template is replaced. The value cannot exceed 1 KB.
          example:
            topic_urn: topic_urn3331
            topic_id: topic_id3332
        time_to_live:
          type: string
          description: "Specifies the maximum retention period of a message in SMN.\
            \ After the retention period expires, SMN does not send this message.\
            \ Unit: second Default value: 3600s (one hour) The retention period must\
            \ be a positive integer less than or equal to 86,400 (3600 x 24)."
          example: "3600"
        message_attributes:
          maxItems: 10
          minItems: 0
          type: array
          description: Specifies the message attribute list.
          items:
            $ref: '#/components/schemas/MessageAttribute'
        locale:
          type: string
          description: "Language of the additional system content in messages sent\
            \ by SMN. If this parameter is not specified, language settings for the\
            \ account are used. The value is the language supported by the site, for\
            \ example, zh-cn or en-us."
          example: zh-cn
    PublishMessageResponseBody:
      required:
      - message_id
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
          example: 9974c07f6d554a6d827956acbeb4be5f
        message_id:
          type: string
          description: "Specifies the message ID, which is unique."
          example: bf94b63a5dfb475994d3ac34664e24f2
    ListInstanceRequestBody:
      required:
      - action
      type: object
      properties:
        tags:
          type: array
          description: A maximum of 10 tag keys are allowed in each query operation.
            Each tag key can have up to 10 tag values. The structure body is mandatory.
            The tag key cannot be left blank or be an empty string. Each tag key and
            tag values of one key must be unique. Resources identified by different
            keys are in AND relationship.
          example:
          - key: key1
            values:
            - '*value1'
            - value2
          items:
            $ref: '#/components/schemas/ResourceTags'
        tags_any:
          type: array
          description: A maximum of 10 tag keys are allowed in each query operation.
            Each tag key can have up to 10 tag values. The structure body is mandatory.
            The tag key cannot be left blank or be an empty string. Each tag key and
            tag values of one key must be unique. Resources identified by different
            keys are in OR relationship.
          example:
          - key: key1
            values:
            - value1
            - value2
          items:
            $ref: '#/components/schemas/ResourceTags'
        not_tags:
          type: array
          description: A maximum of 10 tag keys are allowed in each query operation.
            Each tag key can have up to 10 tag values. The structure body is mandatory.
            The tag key cannot be left blank or be an empty string. Each tag key and
            tag values of one key must be unique. Resources identified by different
            keys are in NAND relationship.
          example:
          - key: key1
            values:
            - '*value1'
            - value2
          - key: key2
            values:
            - '*value21'
            - value22
          items:
            $ref: '#/components/schemas/ResourceTags'
        not_tags_any:
          type: array
          description: A maximum of 10 tag keys are allowed in each query operation.
            Each tag key can have up to 10 tag values. The structure body is mandatory.
            The tag key cannot be left blank or be an empty string. Each tag key and
            tag values of one key must be unique. Resources identified by different
            keys are in NOR relationship.
          example:
          - key: key1
            values:
            - value1
            - value2
          items:
            $ref: '#/components/schemas/ResourceTags'
        offset:
          type: string
          description: "Specifies the index position. The query starts from the next\
            \ data record indexed by this parameter. You do not need to specify this\
            \ parameter when you query resources on the first page. When you query\
            \ resources on subsequent pages, set this parameter to the location returned\
            \ in the response body for the previous query.If action is set to count,\
            \ this parameter does not take effect.If you set action to filter, the\
            \ offset value is 0 by default. The offset value cannot be a negative\
            \ integer."
          example: "0"
          default: "0"
        limit:
          type: string
          description: |-
            Specifies the maximum number of resources to be queried.

            If action is set to count, this parameter does not take effect.

            If you set action to filter, the value of this parameter is 1000 by default. The maximum value of limit is 1000 and the minimum value is 1.
          example: "1000"
          default: "1000"
        action:
          type: string
          description: |-
            Specifies the operation to be performed. The value can be filter (filtering) or count (querying the total number).
            filter indicates pagination query. count indicates that the total number of query results meeting the search criteria will be returned.
          example: filter
        matches:
          type: array
          description: |-
            Specifies the key-value pair to be matched.

            The key can only be resource_name.

            The value will be exactly matched.
          example:
          - key: resource_name
            value: resource1
          items:
            $ref: '#/components/schemas/TagMatch'
        without_any_tag:
          type: boolean
          description: "No tag is contained. If this parameter is set to **true**,\
            \ all resources without tags are queried. In this case, the **tags**,\
            \ **tags_any**, **not_tags**, and **not_tags_any** fields are ignored."
          example: true
    ListInstancesResponseBody:
      required:
      - resources
      - total_count
      type: object
      properties:
        resources:
          type: array
          description: Specifies the returned resource list.
          items:
            $ref: '#/components/schemas/TagResource'
        total_count:
          type: integer
          description: Specifies the total number of records.
          format: int32
    BatchCreateOrDeleteResourceTagsRequestBody:
      required:
      - action
      - tags
      type: object
      properties:
        tags:
          type: array
          description: "Specifies the tag list. For details, see table 1. When you\
            \ delete tags, the tag structure cannot be missing, and the key cannot\
            \ be left blank or be an empty string. The system does not check the character\
            \ set when deleting a tag."
          items:
            $ref: '#/components/schemas/ResourceTag'
        action:
          type: string
          description: Specifies the operation to be performed. The value can be create
            or delete only.
          example: create
    CreateResourceTagRequestBody:
      required:
      - tag
      type: object
      properties:
        tag:
          $ref: '#/components/schemas/ResourceTag'
    ListResourceTagsRequestBody:
      required:
      - tags
      type: object
      properties:
        tags:
          type: array
          description: Specifies resource tags.
          items:
            $ref: '#/components/schemas/ResourceTag'
    ListProjectTagsRequestBody:
      required:
