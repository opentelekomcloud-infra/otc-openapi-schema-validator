            \",\\\"Statement\\\":[{\\\"Sid\\\":\\\"__user_pub_0\\\",\\\"Effect\\\"\
            :\\\"Allow\\\",\\\"Principal\\\":[{\\\"CSP\\\":[\\\"urn:csp:iam::93dc1b4697ac493d9b7d089569f86b32:root\\\
            \"]}],\\\"Action\\\":[\\\"SMN:Publish\\\",\\\"SMN:QueryTopicDetail\\\"\
            ],\\\"Resource\\\":\\\"urn:smn:regionId:8bad8a40e0f7462f8c1676e3f93a8183:aaa\\\
            \"},{\\\"Sid\\\":\\\"__org_path_pub_0\\\",\\\"Effect\\\":\\\"Allow\\\"\
            ,\\\"Principal\\\":{\\\"OrgPath\\\":[\\\"o-bf966fe82ebb4d35d68b791729228788/r-001ebf32880a13eabfc8e1c37eee3ae9/ou-0dbfffe92fd92ddb35feff9b4079459c\\\
            \"]},\\\"Action\\\":[\\\"SMN:Publish\\\",\\\"SMN:QueryTopicDetail\\\"\
            ],\\\"Resource\\\":\\\"urn:smn:regionId:8bad8a40e0f7462f8c1676e3f93a8183:aaa\\\
            \"},{\\\"Sid\\\":\\\"__service_pub_0\\\",\\\"Effect\\\":\\\"Allow\\\"\
