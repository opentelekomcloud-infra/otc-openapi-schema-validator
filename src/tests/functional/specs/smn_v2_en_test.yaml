          items:
            $ref: '#/components/schemas/ResourceTags'
    CreateMessageTemplateRequestBody:
      required:
      - content
      - message_template_name
      type: object
      properties:
        message_template_name:
          type: string
          description: "Specifies the template name. Enter 1 to 64 characters, and\
            \ start with a letter or digit. Only letters, digits, hyphens (-), and\
            \ underscores (_) are allowed."
          example: confirm_message
        protocol:
          type: string
          description: |-
            Specifies the protocol supported by the template.

            The following protocols are supported:

            default

            email

            sms

            functionstage

            http and https
          example: https
        content:
          type: string
          description: "Specifies the template content, which supports plain text\
            \ only. The template content cannot be left blank or larger than 256 KB."
          example: "(1/2)You are invited to subscribe to topic({topic_id}). Click\
            \ the following URL to confirm subscription:(If you do not want to subscribe\
            \ to this topic, ignore this message.)"
    CreateMessageTemplateResponseBody:
      required:
      - message_template_id
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: "Specifies the request ID, which is unique."
          example: ca03efa691624d8eb2dfeba01a1bcf6e
        message_template_id:
          type: string
          description: "Specifies the resource identifier of the template, which is\
            \ unique."
          example: 57ba8dcecda844878c5dd5815b65d10f
    UpdateMessageTemplateRequestBody:
      required:
      - content
      type: object
      properties:
        content:
          type: string
          description: Specifies the template content.
          example: "(1/22)You are invited to subscribe to topic({topic_id_id1}). Click\
            \ the following URL to confirm subscription:(If you do not want to subscribe\
            \ to this topic, ignore this message.)"
    UpdateMessageTemplateResponseBody:
      required:
      - request_id
      type: object
