    UpdateTopicAttributeRequestBody:
      required:
      - value
      type: object
      properties:
        value:
          type: string
          description: |-
            1. If you set name to access_policy, value is the topic attribute, and the maximum length of value is 30 KB.

            2. If you set name to introduction, value is the topic introduction, and the maximum length of value is 120 bytes.
          example: "\"{\\\"Version\\\": \\\"2016-09-07\\\",  \\\"Id\\\": \\\"__default_policy_ID\\\
            \",  \\\"Statement\\\": [{\\\"Sid\\\": \\\"__user_pub_0\\\",\\\"Effect\\\
            \": \\\"Allow\\\",\\\"Principal\\\": {\\\"CSP\\\": [\\\"urn:csp:iam::93dc1b4697ac493d9b7d089569f86b32:root\\\
            \"]},\\\"Action\\\": [\\\"SMN:Publish\\\",\\\"SMN:QueryTopicDetail\\\"\
            ],\\\"Resource\\\": \\\"urn:smn:regionId:8bad8a40e0f7462f8c1676e3f93a8183:zhaoli\\\
            \"},{\\\"Sid\\\": \\\"__service_pub_0\\\",      \\\"Effect\\\": \\\"Allow\\\
