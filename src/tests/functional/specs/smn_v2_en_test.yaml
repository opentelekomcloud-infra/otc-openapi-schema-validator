  /v2/{project_id}/notifications/subscriptions:
    get:
      tags:
      - Subscriptions
      summary: Querying Subscriptions
      description: "This API is used to query the list of all subscriptions by page.\
        \ The list is sorted by subscription adding time in ascending order. You can\
        \ specify offset and limit. If no subscription has been added to the topic,\
        \ an empty list is returned."
      operationId: ListSubscriptions
      parameters:
      - name: project_id
        in: path
        description: "Specifies the project ID.For details about how to obtain the\
          \ project ID, see [Obtaining the Project ID](smn_api_66000.xml)."
        required: true
        schema:
          type: string
        example: 2c31ed520xxxxxxebedb6e81xxxxxxxx
      - name: offset
        in: query
        description: |-
          Specifies the offset.

          If the offset is an integer greater than 0 but less than the number of resources, all resources in excess of this offset will be queried. The default offset is 0.
        schema:
          type: integer
          default: 0
      - name: limit
        in: query
        description: |-
          Specifies the maximum number of records in each query.

          The number ranges from 1 to 100 and is generally 10, 20, or 50. Specifies the number of resources returned on each page. The default number is 100.
        schema:
          type: integer
          default: 100
      - name: protocol
        in: query
        description: "Specifies the protocol name. The enumerated values are http,\
          \ https, sms, email, functionstage."
        schema:
          type: string
      - name: status
        in: query
        description: |-
          Specifies the subscription status.
          0: The subscription has not been confirmed.
          1: The subscription has been confirmed.
          2: Confirmation is not required.
          3: The subscription was canceled.
          4: The subscription was deleted.
        schema:
          type: integer
      - name: endpoint
        in: query
        description: Specifies the subscription endpoint.
        schema:
          type: string
      - name: X-Auth-Token
        in: header
        description: |-
          Specifies a user token.

          It can be obtained by calling an IAM API. The value of X-Subject-Token in the response header is the user token.
        required: true
        schema:
          type: string
        example: MIIDkgYJKoZIhvcNAQcCoIIDgzCCXXXXXX...
      - name: fuzzy_remark
        in: query
        description: Specifies the subscription remark for fuzzy match. The value
          can contain up to 128 bytes.
        allowEmptyValue: true
        schema:
          pattern: "^[^+]$"
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ListSubscriptionsResponseBody'
            application/json:
              example:
                request_id: 6a63a18b8bab40ffb71ebd9cb80d0085
                subscription_count: 2
                subscriptions:
                - topic_urn: urn:smn:regionId:762bdb3251034f268af0e395c53ea09b:test_topic_v1
                  protocol: sms
                  subscription_urn: urn:smn:regionId:762bdb3251034f268af0e395c53ea09b:test_topic_v1:2e778e84408e44058e6cbc6d3c377837
                  owner: 762bdb3251034f268af0e395c53ea09b
                  endpoint: xxxxxxxxxxx
                  remark: ""
                  status: 0
                  filter_polices:
                  - name: alarm
                    string_equals:
                    - os
                    - process
                  - name: service
                    string_equals:
                    - api
                    - db
                - topic_urn: urn:smn:regionId:762bdb3251034f268af0e395c53ea09b:test_topic_v1
                  protocol: email
                  subscription_urn: urn:smn:regionId:762bdb3251034f268af0e395c53ea09b:test_topic_v1:a2d52a9f5c3b47f48c3fafb177a58796
                  owner: 762bdb3251034f268af0e395c53ea09b
