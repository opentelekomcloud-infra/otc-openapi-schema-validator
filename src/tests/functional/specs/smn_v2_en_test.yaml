          type: string
          description: Specifies the project ID of the topic creator.
        endpoint:
          type: string
          description: Specifies the message receiving endpoint.
        remark:
          type: string
          description: Specifies the remarks.
        status:
          type: integer
          description: 0 indicates that the subscription is not confirmed. 1 indicates
            that the subscription is confirmed. 3 indicates that the subscription
            is canceled.
        filter_polices:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionsFilterPolicy'
    SubscriptionExtension:
      type: object
      properties:
        client_id:
          maxLength: 64
          minLength: 1
          type: string
          description: Specifies the application ID. This field is mandatory when
            you set **protocol** to **welink**. Obtain the value from WeLink.
          example: 202209081117015156XXXXX
        client_secret:
          maxLength: 64
          minLength: 1
          type: string
          description: Specifies the application secret. This field is mandatory when
            you set **protocol** to **welink**. Obtain the value from WeLink.
          example: fa7f59b7-6e72-4734-a136-ecb582XXXXX
        keyword:
          maxLength: 20
          minLength: 0
          type: string
          description: "Specifies the keyword. When you set **protocol** to **feishu**,\
            \ you must set either **keyword** or **sign_secret**. When you add a keyword\
            \ for security verification on the Lark chatbot or a custom DingTalk chatbot,\
            \ **keyword** must be one of the keywords you entered for the Lark chatbot\
            \ or the custom DingTalk chatbot."
          example: XXX
        sign_secret:
          maxLength: 256
          minLength: 0
          type: string
          description: "Specifies the key. When you set **protocol** to **feishu**,\
            \ you must set either this parameter or **keyword**. The value of this\
            \ parameter must be the same as that you customized for the Lark chatbot\
            \ or the custom DingTalk chatbot. For example, if you set only **key**\
            \ for the Lark chatbot, enter the value of **key**. If you set only **keyword**\
            \ for the Lark chatbot, skip this field."
          example: XXX-XXXX
        header:
          type: object
          additionalProperties:
            type: string
          description: |-
            This is an HTTP header field, which can be customized within the field range. The field content exists in the form of key/value pairs. When a topic is used to send messages, confirmed subscription messages carry the user-defined HTTP header.
            Header for subscriptions over HTTP or HTTPS. The header must meet the following requirements:
            **key** can contain letters, digits, and hyphens (-). **key** cannot end with a hyphen (-) nor contain consecutive hyphens (-).
            You can specify up to 10 key/value pairs.
            **key** must start with **x-**but not **x-smn**. Examples: **x-abc-cba** or **x-abc**
            The total length of all key/value pairs cannot exceed 1,024 characters.
            **key** is case insensitive.
            **key** must be unique.
            **value** must be an ASCII code. Unicode characters are not supported. Spaces are allowed.
          example: "\"header\": { \t\t\t\t\t\"x-abc-cba\": \"Value1\", \t\t\t\t\t\"\
            x-abc\": \"Value2\" \t\t\t\t}"
        app_key:
          type: string
          description: "The **appKey** field of DingTalk can contain a maximum of\
            \ 64 characters. Only letters, digits, hyphens (-), and underscores (_)\
            \ are allowed. This parameter is mandatory when the protocol is set to\
            \ **dingTalkBot**."
        app_secret:
          type: string
          description: "The **appSecret** field of DingTalk can contain a maximum\
            \ of 128 characters. Only letters, digits, hyphens (-), and underscores\
            \ (_) are allowed. This parameter is mandatory when the protocol is set\
            \ to **dingTalkBot**."
        robot_code:
          type: string
          description: "The **robotCode** field of DingTalk can contain a maximum\
            \ of 64 characters. Only letters, digits, hyphens (-), and underscores\
            \ (_) are allowed. Generally, the value is the same as that of **appKey**.\
            \ This parameter is mandatory when the protocol is set to **dingTalkBot**."
    SubscriptionsFilterPolicy:
      required:
      - name
      - string_equals
      type: object
      properties:
        name:
          maxLength: 32
          minLength: 1
          pattern: "^(?!smn_)(?!.*?_$)(?!^_)(?!.*?__)[a-z0-9_]{1,32}$"
          type: string
          description: |-
            Specifies the filter policy name.
            **name** can contain 1 to 32 characters, including lowercase letters, digits, and underscores (_). **name** cannot start or end with an underscore, nor contain consecutive underscores. **name** cannot start with **smn_**.
        string_equals:
          maxItems: 10
          minItems: 1
          type: array
          description: "Specifies the string array for exact match. An array can contain\
            \ 1 to 10 strings. The array content must be unique. The string cannot\
            \ be **null** or an empty string \"\". A string can contain 1 to 32 characters,\
            \ including letters, digits, and underscores (_)."
          items:
            maxLength: 32
            minLength: 1
            pattern: "^[\\u4E00-\\u9FA5A-Za-z0-9_]{1,32}$"
            type: string
      description: Specifies the filter policy.
    MessageAttribute:
      required:
      - name
      - type
      - value
      type: object
      properties:
        name:
          maxLength: 32
          minLength: 1
          pattern: "^[a-z0-9](?!.*?_{2,})([a-z0-9_]{0,30}[a-z0-9])?$"
          type: string
          description: "Specifies the attribute name. **name** can contain 1 to 32\
            \ characters, including only lowercase letters, digits, and underscores\
            \ (_). **name** cannot start or end with an underscore, nor contain consecutive\
            \ underscores."
          example: smn_protocol
        type:
          type: string
          description: |-
            Specifies the attribute type. The value can be one of the following:
            **STRING**
            **STRING_ARRAY**
            **PROTOCOL**
          example: PROTOCOL
          enum:
          - STRING
          - STRING_ARRAY
          - PROTOCOL
        value:
          type: object
          properties: {}
          description: |-
            Specifies the attribute value.
            When you set **type** to **STRING**, **value** can contain 1 to 32 characters, including only letters, digits, and underscores (_).
            When you set **type** to **STRING_ARRAY**, **value** is an array containing 1 to 10 strings. Each string in the array must be unique. Each string in the array must contain 1 to 32 characters, including only letters, digits, and underscores (_).
            When you set **type** to **PROTOCOL**, **value** is a string array of supported protocol types.
          example: "[\"email\",\"sms\"]"
      description: Specifies the message attribute.
    BatchAddSubscriptionsRequestBody:
      required:
      - endpoint
      - protocol
      type: object
      properties:
        protocol:
          type: string
          description: |-
            Subscription protocol. (Different protocols indicate different types of endpoints to receive messages.)
            The following protocols are supported:

            **email**: The endpoints are email addresses.

            **sms**: SMS transmission protocol. The endpoints are phone numbers.

            **functionstage**: FunctionGraph(function) transmission protocol. The endpoints are functions.

            **functiongraph**: FunctionGraph(workflow) transmission protocol. The endpoints are FunctionGraph workflows orchestrated by the FunctionGraph function.

            **http** and **https**: The endpoints are URLs.

            **callnotify**: Voice notification protocol. The endpoints are phone numbers.

            **wechat**: WeCom group chatbot transmission protocol.

            **dingding**: DingTalk group chatbot transmission protocol.

            **feishu**: Lark group chatbot transmission protocol.

            **welink**: WeLink group chatbot transmission protocol.
          example: email
        endpoint:
          type: string
          description: |-
            Note:

            If you use the HTTP protocol, start the endpoint with **http://**.

            If you use the HTTPS protocol, start the endpoint with **https://**.

            If you use the email protocol, enter an email address.

            If you use the SMS protocol, enter a phone number.

            If you use the FunctionGraph (function) protocol, enter a function.

            If you use the FunctionGraph (workflow) protocol, enter a workflow.

            If you use the voice notification protocol, enter a phone number.

            If you use the DingTalk chatbot protocol, enter the webhook URL of a custom DingTalk group chatbot or **openConversationId** of a group to which an enterprise DingTalk chatbot is added. When you add **openConversationId**, do not start the endpoint with **http://** or **https://**.

            If you use the **wechat** protocol, enter the webhook URL of a WeCom group chatbot.

            If you use the**feishu** protocol, enter the webhook URL of a Lark group chatbot.

            If you use the **welink** protocol, enter a WeLink group number.
          example: xxx@example.com
        remark:
          type: string
          description: Remarks. The remarks must be UTF-8-coded and can contain up
            to 128 bytes.
          example: O&M engineer A.
        extension:
          $ref: '#/components/schemas/SubscriptionExtension'
    OpenAPIFailedResp:
      required:
      - code
      - message
      - request_id
      type: object
      properties:
        request_id:
          type: string
          description: Unique request ID.
          example: 6a63a18b8bab40ffb71ebd9cb80d0085
        code:
          type: string
          description: Service error code.
          example: SMN.0167
        message:
          type: string
          description: Service error description.
          example: xxxxxxxx
        error_code:
          type: string
          description: Service error code.
        error_msg:
          type: string
          description: Service error description.
        encoded_authorization_message:
          type: string
          description: Encrypted detailed reason for rejection.
        details:
          $ref: '#/components/schemas/OpenAPIFailedDetails'
    OpenAPIFailedDetails:
      type: object
      properties:
        error_code:
          type: string
          description: Error code in the response of the dependent service called
            by the cloud service.
        error_msg:
          type: string
          description: Error message in the response of the dependent service called
            by the cloud service.
  parameters:
    X-Auth-Token:
      name: X-Auth-Token
      in: header
      description: |-
        Specifies a user token.

        It can be obtained by calling an IAM API. The value of X-Subject-Token in the response header is the user token.
      required: true
      schema:
        type: string
      example: MIIDkgYJKoZIhvcNAQcCoIIDgzCCXXXXXX...
