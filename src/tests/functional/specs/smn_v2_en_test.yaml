            \ be left blank or be an empty string. The system does not check the character\
            \ set when deleting a tag."
          items:
            $ref: '#/components/schemas/ResourceTag'
        action:
          type: string
          description: Specifies the operation to be performed. The value can be create
            or delete only.
          example: create
    CreateResourceTagRequestBody:
