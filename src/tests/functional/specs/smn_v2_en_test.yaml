        Three message formats are supported:

        message

        message_structure

        message_template_name

        If three formats are specified at the same time, they will be applied in the following sequence:
        **message_structure** > **message_template_name** > **message**
        If a KMS key has been bound to the topic, before publishing messages, create an agency named **smn_kms_agency** on IAM and assign resource operation permissions to SMN. When publishing messages, SMN uses this agency to create and decrypt data keys.
      operationId: PublishMessage
