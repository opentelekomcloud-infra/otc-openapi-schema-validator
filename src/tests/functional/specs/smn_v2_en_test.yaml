  /v2/{project_id}/notifications/topics:
    get:
      tags:
      - Topics
      summary: Querying Topics
      description: "This API is used to query topics by page. The topics are sorted\
        \ by creation time in descending order. You can specify offset and limit.\
        \ If no topic has been created, an empty list is returned."
      operationId: ListTopics
      parameters:
      - name: project_id
        in: path
        description: "Specifies the project ID.For details about how to obtain the\
          \ project ID, see [Obtaining the Project ID](smn_api_66000.xml)."
        required: true
        schema:
          type: string
        example: 2c31ed520xxxxxxebedb6e81xxxxxxxx
      - name: offset
        in: query
        description: |-
          Specifies the offset.

          If the offset is an integer greater than 0 but less than the number of resources, all resources in excess of this offset will be queried. The default offset is 0.
        schema:
          type: integer
          default: 0
      - name: limit
        in: query
        description: |-
          Specifies the maximum number of records in each query.

          The number ranges from 1 to 100 and is generally 10, 20, or 50. Specifies the number of resources returned on each page. The default number is 100.
        schema:
          type: integer
          default: 100
      - name: enterprise_project_id
        in: query
        description: Specifies the enterprise project ID.
        schema:
          type: string
      - name: name
        in: query
        description: "Specifies the name of the topic to be searched for, which must\
          \ be fully matched."
        schema:
          type: string
      - name: fuzzy_name
        in: query
        description: Specifies the name of the topic to be searched. Fuzzy matching
          is used.
        allowEmptyValue: true
        schema:
          pattern: "^[-_a-zA-Z0-9]{0,255}$"
          type: string
      - name: topic_id
        in: query
        description: Specifies the topic ID for exact search.
        schema:
          type: string
      - name: X-Auth-Token
        in: header
        description: |-
          Specifies a user token.

          It can be obtained by calling an IAM API. The value of X-Subject-Token in the response header is the user token.
        required: true
        schema:
          type: string
        example: MIIDkgYJKoZIhvcNAQcCoIIDgzCCXXXXXX...
      - name: fuzzy_display_name
        in: query
        description: Specifies the display name of the topic to be searched. Fuzzy
          matching is used. The display name cannot exceed 192 bytes.
        allowEmptyValue: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ListTopicsResponseBody'
            application/json:
              example:
                request_id: 6a63a18b8bab40ffb71ebd9cb80d0085
                topic_count: 1
                topics:
                - topic_urn: urn:smn:regionId:8bad8a40e0f7462f8c1676e3f93a8183:test_topic_v2
                  display_name: testtest
                  name: test_topic_v1
                  push_policy: 0
                  enterprise_project_id: "0"
                  topic_id: 84698185946d44d08431aa441d8e2cf2
                  create_time: 2016-08-02T08:22:18Z
                  update_time: 2016-08-02T08:22:18Z
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FailedResp'
        "403":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FailedResp'
        "404":
          description: Not Found
          content:
            '*/*':
