rules:
  - id: "FIL-030-01-2507-2507-M"
    title: "Sorting Parameters Consistency Check"
    message: "Sorting must use sort_key and sort_dir with valid values and defaults."
    option: Mandatory
    location: path
    call:
      function: checkSortingParams
      functionParams:
        methods: ["get"]
        keywords:
          key: "sort_key"
          dir: "sort_dir"
        allowedDirValues: ["asc", "desc"]
        defaultDir: "asc"
        requireTogether: true          # if one exists -> the other must exist
        enforceOrder: true             # order in parameters list or in examples (best-effort)
        disallowOtherSortParams: true  # if any param starts with sort/ordering but not these -> error (optional)
        defaultDirNotAllowed: false    # if you want to forbid default value on sort_dir param
    status: implemented
    severity: critical
