rules:
  - id: "VER-030-01-2507-2507-O-1"
    title: "API Version Presence and Prefix"
    message: "Each API must define a version in info.version, and the version must start with 'v'."
    option: Mandatory
    location: info
    element: version
    call: {
      function: versionConventionCheck,
      functionParams: {
        "mode": "presenceAndPrefix",
        "versionPattern": "^v.+$"
      }
    }
    severity: "critical"
    status: implemented

  - id: "VER-030-01-2507-2507-O-2"
    title: "Version Format Compliance"
    message: "The API version must be in the format vX, vX.Y or vX.Y.Z, where X, Y and Z are integers."
    option: Mandatory
    location: info
    element: version
    call: {
      function: versionConventionCheck,
      functionParams: {
        "mode": "formatCompliance",
        "versionPattern": "^v[0-9]+(\\.[0-9]+)?(\\.[0-9]+)?$"
      }
    }
    severity: "critical"
    status: implemented

  - id: "VER-030-01-2507-2507-O-3"
    title: "Maximum API Version Segments"
    message: "The total number of version segments must not exceed four, including the 'v' major segment notation."
    option: Mandatory
    location: info
    element: version
    call: {
      function: versionConventionCheck,
      functionParams: {
        "mode": "maxSegments",
        "maxVersions": 4
      }
    }
    severity: "high"
    status: implemented

  - id: "VER-030-01-2507-2507-O-4"
    title: "Version Normalization"
    message: "The API version should be normalized to vX in future versions; vX.Y and vX.Y.Z are tolerated for backward compatibility but considered non-normalized."
    option: Mandatory
    location: info
    element: version
    call: {
      function: versionConventionCheck,
      functionParams: {
        "mode": "normalization",
        "deprecatedPattern": "^v[0-9]+(\\.[0-9]+){1,2}$"
      }
    }
    severity: "medium"
    status: implemented

  - id: "VER-030-01-2507-2507-O-5"
    title: "Incompatible Changes Versioning"
    message: "For incompatible changes, the version number must be upgraded appropriately."
    option: Mandatory
    location: info
    element: version
    call: {
      function: incompatibleChangeVersioningCheck,
      functionParams: {
        "versionPattern": "^v[0-9]+$"
      }
    }
    severity: "high"
    status: devel
